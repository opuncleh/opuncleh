services:
  - type: web
    name: opuncleh
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: OPUNCLEH_STATE_DIR
        value: /data/.opuncleh
      - key: OPUNCLEH_WORKSPACE_DIR
        value: /data/workspace
      - key: OPUNCLEH_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: opuncleh-data
      mountPath: /data
      sizeGB: 1
