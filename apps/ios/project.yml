name: Opuncleh
options:
  bundleIdPrefix: ai.opuncleh
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_APP_INTENTS_METADATA_GENERATION: NO

packages:
  OpunclehKit:
    path: ../shared/OpunclehKit
  Swabble:
    path: ../../Swabble

schemes:
  Opuncleh:
    shared: true
    build:
      targets:
        Opuncleh: all
    test:
      targets:
        - OpunclehTests
        - OpunclehLogicTests
  OpunclehLogicTests:
    shared: true
    build:
      targets:
        OpunclehLogicTests: all
    test:
      targets:
        - OpunclehLogicTests

targets:
  Opuncleh:
    type: application
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Sources
    dependencies:
      - target: OpunclehShareExtension
        embed: true
      - target: OpunclehActivityWidget
        embed: true
      - target: OpunclehWatchApp
      - package: OpunclehKit
      - package: OpunclehKit
        product: OpunclehChatUI
      - package: OpunclehKit
        product: OpunclehProtocol
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    preBuildScripts:
      - name: SwiftFormat (lint)
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftformat >/dev/null 2>&1; then
            echo "error: swiftformat not found (brew install swiftformat)" >&2
            exit 1
          fi
          swiftformat --lint --config "$SRCROOT/../../.swiftformat" \
            --filelist "$SRCROOT/SwiftSources.input.xcfilelist"
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftlint >/dev/null 2>&1; then
            echo "error: swiftlint not found (brew install swiftlint)" >&2
            exit 1
          fi
          swiftlint lint --config "$SRCROOT/.swiftlint.yml" --use-script-input-file-lists
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: Sources/Opuncleh.entitlements
        CODE_SIGN_STYLE: "$(OPUNCLEH_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(OPUNCLEH_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(OPUNCLEH_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(OPUNCLEH_APP_PROFILE)"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
      configs:
        Debug:
          OPUNCLEH_PUSH_TRANSPORT: direct
          OPUNCLEH_PUSH_DISTRIBUTION: local
          OPUNCLEH_PUSH_RELAY_BASE_URL: ""
          OPUNCLEH_PUSH_APNS_ENVIRONMENT: sandbox
        Release:
          OPUNCLEH_PUSH_TRANSPORT: direct
          OPUNCLEH_PUSH_DISTRIBUTION: local
          OPUNCLEH_PUSH_RELAY_BASE_URL: ""
          OPUNCLEH_PUSH_APNS_ENVIRONMENT: production
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Opuncleh
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLName: ai.opuncleh.ios
            CFBundleURLSchemes:
              - opuncleh
        CFBundleShortVersionString: "$(OPUNCLEH_MARKETING_VERSION)"
        CFBundleVersion: "$(OPUNCLEH_BUILD_VERSION)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - ai.opuncleh.ios.bgrefresh
        NSLocalNetworkUsageDescription: Opuncleh discovers and connects to your Opuncleh gateway on the local network.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInWebContent: true
        NSBonjourServices:
          - _opuncleh-gw._tcp
        NSCameraUsageDescription: Opuncleh can capture photos or short video clips when requested via the gateway.
        NSLocationWhenInUseUsageDescription: Opuncleh uses your location when you allow location sharing.
        NSLocationAlwaysAndWhenInUseUsageDescription: Opuncleh can share your location in the background when you enable Always.
        NSMicrophoneUsageDescription: Opuncleh needs microphone access for voice wake.
        NSMotionUsageDescription: Opuncleh may use motion data to support device-aware interactions and automations.
        NSPhotoLibraryUsageDescription: Opuncleh needs photo library access when you choose existing photos to share with your assistant.
        NSSpeechRecognitionUsageDescription: Opuncleh uses on-device speech recognition for voice wake.
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
        OpunclehPushTransport: "$(OPUNCLEH_PUSH_TRANSPORT)"
        OpunclehPushDistribution: "$(OPUNCLEH_PUSH_DISTRIBUTION)"
        OpunclehPushRelayBaseURL: "$(OPUNCLEH_PUSH_RELAY_BASE_URL)"
        OpunclehPushAPNsEnvironment: "$(OPUNCLEH_PUSH_APNS_ENVIRONMENT)"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  OpunclehShareExtension:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ShareExtension
    dependencies:
      - package: OpunclehKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(OPUNCLEH_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(OPUNCLEH_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(OPUNCLEH_SHARE_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(OPUNCLEH_SHARE_PROFILE)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Opuncleh Share
        CFBundleShortVersionString: "$(OPUNCLEH_MARKETING_VERSION)"
        CFBundleVersion: "$(OPUNCLEH_BUILD_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 10
              NSExtensionActivationSupportsMovieWithMaxCount: 1

  OpunclehActivityWidget:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ActivityWidget
      - path: Sources/LiveActivity/OpunclehActivityAttributes.swift
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(OPUNCLEH_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(OPUNCLEH_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(OPUNCLEH_ACTIVITY_WIDGET_BUNDLE_ID)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
    info:
      path: ActivityWidget/Info.plist
      properties:
        CFBundleDisplayName: Opuncleh Activity
        CFBundleShortVersionString: "$(OPUNCLEH_MARKETING_VERSION)"
        CFBundleVersion: "$(OPUNCLEH_BUILD_VERSION)"
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  OpunclehWatchApp:
    type: application.watchapp2
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchApp
    dependencies:
      - target: OpunclehWatchExtension
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(OPUNCLEH_WATCH_APP_BUNDLE_ID)"
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: Opuncleh
        CFBundleShortVersionString: "$(OPUNCLEH_MARKETING_VERSION)"
        CFBundleVersion: "$(OPUNCLEH_BUILD_VERSION)"
        WKCompanionAppBundleIdentifier: "$(OPUNCLEH_APP_BUNDLE_ID)"
        WKWatchKitApp: true

  OpunclehWatchExtension:
    type: watchkit2-extension
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchExtension/Sources
    dependencies:
      - sdk: AppIntents.framework
      - sdk: WatchConnectivity.framework
      - sdk: UserNotifications.framework
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "$(OPUNCLEH_WATCH_EXTENSION_BUNDLE_ID)"
    info:
      path: WatchExtension/Info.plist
      properties:
        CFBundleDisplayName: Opuncleh
        CFBundleShortVersionString: "$(OPUNCLEH_MARKETING_VERSION)"
        CFBundleVersion: "$(OPUNCLEH_BUILD_VERSION)"
        NSExtension:
          NSExtensionAttributes:
            WKAppBundleIdentifier: "$(OPUNCLEH_WATCH_APP_BUNDLE_ID)"
          NSExtensionPointIdentifier: com.apple.watchkit

  OpunclehTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests
        excludes:
          - Logic
    dependencies:
      - target: Opuncleh
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(OPUNCLEH_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(OPUNCLEH_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.opuncleh.ios.tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Opuncleh.app/Opuncleh"
        BUNDLE_LOADER: "$(TEST_HOST)"
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: OpunclehTests
        CFBundleShortVersionString: "$(OPUNCLEH_MARKETING_VERSION)"
        CFBundleVersion: "$(OPUNCLEH_BUILD_VERSION)"

  OpunclehLogicTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests/Logic
    dependencies:
      - package: OpunclehKit
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(OPUNCLEH_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(OPUNCLEH_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.opuncleh.ios.logic-tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: OpunclehLogicTests
        CFBundleShortVersionString: "$(OPUNCLEH_MARKETING_VERSION)"
        CFBundleVersion: "$(OPUNCLEH_BUILD_VERSION)"
